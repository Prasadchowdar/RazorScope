worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Log format with request ID for tracing
    log_format main '$remote_addr - $request_id "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Security headers applied to all responses
    add_header X-Content-Type-Options  nosniff        always;
    add_header X-Frame-Options         DENY           always;
    add_header Referrer-Policy         no-referrer    always;

    # ── Webhook Receiver (port 443) ────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name webhooks.razorscope.local;

        ssl_certificate     /etc/nginx/certs/razorscope.crt;
        ssl_certificate_key /etc/nginx/certs/razorscope.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Webhook endpoint — Razorpay POSTs here
        location /v1/webhooks/ {
            proxy_pass         http://webhook-receiver:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://webhook-receiver:8080;
        }
    }

    # ── Dashboard API (port 8443) ──────────────────────────────────────────────
    server {
        listen 8443 ssl;
        server_name api.razorscope.local;

        ssl_certificate     /etc/nginx/certs/razorscope.crt;
        ssl_certificate_key /etc/nginx/certs/razorscope.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api:8000;
        }
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
